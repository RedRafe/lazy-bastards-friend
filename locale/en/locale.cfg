[mod-setting-description]
lbf-watchdog-enabled=When the force's science consumption exceeds the SPM threshold, the mod turns itself off. Admins can re-enable it afterwards.
lbf-spm-threshold=Science consumed per minute (the built-in "science" statistic) that triggers auto-retirement. Set to 0 to retire immediately; disable the watchdog setting to never retire.
lbf-watchdog-stops-combat=If enabled, auto-retirement also disables the Combat (turret feeding) channel. By default Combat keeps running.
lbf-min-radius=Lower bound for the per-player area radius.
lbf-max-radius=Upper bound for the per-player area radius.
lbf-update-period=How many ticks between service cycles per player. Lower = more responsive, higher = cheaper.
lbf-allow-chest-take=Server-wide permission for the per-player "take from chests" option.
lbf-radius=Radius (in tiles) of the area serviced around you. Also adjustable from the panel next to your character screen.
lbf-feed-fuel=Top up burners with the best fuel you can spare. Also adjustable from the panel next to your character screen.
lbf-feed-ingredients=Fill machine inputs: recipe ingredients, ore, science packs for current research. Also adjustable from the panel next to your character screen.
lbf-take-chests=Also empty nearby chests into your inventory. Also adjustable from the panel next to your character screen.
lbf-pickup-ground=Also scoop up items lying on the ground around you. Also adjustable from the panel next to your character screen.
lbf-drain-trash=Move items from your logistic trash slots into nearby chests. Also adjustable from the panel next to your character screen.
lbf-show-summary=Show a floating summary of items moved after each service cycle. Also adjustable from the panel next to your character screen.
lbf-shape=Shape of the serviced area — circle or square. Also adjustable from the panel next to your character screen.
lbf-fill-area=Tint the whole serviced area, not just its edge. Also adjustable from the panel next to your character screen.
lbf-opacity=Fill opacity of the serviced area, in percent. Also adjustable from the panel next to your character screen.
lbf-use-my-color=Draw the serviced area in your player color instead of a custom one. Also adjustable from the panel next to your character screen.
lbf-color=Custom area color (used when "Use my player color" is off).
lbf-show-to-others=Let other players see your serviced area. Also adjustable from the panel next to your character screen.


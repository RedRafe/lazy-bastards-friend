[mod-setting-description]
lbf-watchdog-enabled=When the force's science consumption exceeds the SPM threshold, the mod turns itself off. After it trips, turning this setting back on re-arms it — re-enabling the channels alone does not.
lbf-spm-threshold=Science consumed per minute (the built-in "science" statistic) that triggers auto-retirement. Set to 0 to retire immediately; disable the watchdog setting to never retire.
lbf-min-radius=Lower bound for the per-player area radius.
lbf-max-radius=Upper bound for the per-player area radius.
lbf-update-period=How many ticks between service cycles per player. Lower = more responsive, higher = cheaper.
lbf-allow-chest-collect=Server-wide permission for the per-player "collect from chests" option.
lbf-enabled=Your personal master switch: turns all of Lazy Bastard's Friend ON or OFF for you, keeping your individual choices. Also the On/Off switch next to your character screen.
lbf-radius=Radius (in tiles) of the area serviced around you. Also adjustable from the panel next to your character screen.
lbf-feed-fuel=Top up burners with the best fuel you can spare. Also adjustable from the panel next to your character screen.
lbf-feed-ingredients=Fill machine inputs: recipe ingredients, ore, science packs for current research.\nAlso adjustable from the panel next to your character screen.\nAlso available in player's shortcuts.
lbf-collect-chests=Also empty nearby chests into your inventory. Also adjustable from the panel next to your character screen.
lbf-collect-ground=Scoop up items lying on the ground around you. Also adjustable from the panel next to your character screen.
lbf-drain-trash=Move items from your logistic trash slots into nearby chests. Also adjustable from the panel next to your character screen.
lbf-show-summary=Show a floating summary of items moved after each service cycle. Also adjustable from the panel next to your character screen.
lbf-shape=Shape of the serviced area — circle or square. Also adjustable from the panel next to your character screen.
lbf-fill-area=Draw the serviced area around you, and enable starvation feedback/showing others' areas. Unchecked hides all of the mod's renders for you entirely; the mod keeps working. Also adjustable from the panel next to your character screen.
lbf-opacity=Fill opacity of the serviced area, in percent. Also adjustable from the panel next to your character screen.
lbf-use-my-color=Draw the serviced area in your player color instead of a custom one. Also adjustable from the panel next to your character screen.
lbf-color=Custom area color (used when "Use my player color" is off).
lbf-show-others-area=See other players' serviced areas overlaid on the map. Only affects what you see. Also adjustable from the panel next to your character screen.
lbf-rebalance=Move surplus fuel/ingredients between over- and under-stocked machines in your area, even when you carry nothing to feed them. Also adjustable from the panel next to your character screen.
lbf-show-starvation=Briefly show an icon over machines that wanted an item you couldn't spare (red) or are already full (green). Also adjustable from the panel next to your character screen.

[item-name]
lbf-items-moved=Lazy Bastard's Friend: items moved


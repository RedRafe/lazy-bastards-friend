scenario-name=LBF test bench
description=Your task is to test Lazy Bastard's Friend. Furnaces, drills, turrets, chests, an assembler and labs are already waiting around spawn, and your pockets are stuffed with fuel, ore, ammo and science packs. Walk around, let the mod do the feeding, and don't forget to retire it by dropping science packs into the labs.\n[font=default-bold]This is the intended way of testing Lazy Bastard's Friend.[/font]
